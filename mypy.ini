[mypy]
python_version = 3.12
ignore_missing_imports = True
exclude = (site-packages|\.venv|venv|examples|benchmarks|__pycache__)
# Don't descend into third-party implementations during checking
follow_imports = skip

# Ignore known problematic modules
[mypy-pytest.*]
follow_imports = skip
ignore_errors = True

[mypy-_pytest.*]
follow_imports = skip
ignore_errors = True

# Ratchet: non-uniform fit() vs BaseEstimator; tighten incrementally.
[mypy-anomsmith.primitives.survival.*]
ignore_errors = True

[mypy-anomsmith.primitives.classifiers.corn_lstm]
ignore_errors = True

[mypy-anomsmith.primitives.classifiers.ensemble_ordinal]
ignore_errors = True

[mypy-anomsmith.primitives.detectors.ml]
ignore_errors = True

[mypy-anomsmith.primitives.scorers.statistical]
ignore_errors = True

[mypy-anomsmith.workflows.survival]
ignore_errors = True

[mypy-anomsmith.workflows.model_monitoring]
ignore_errors = True
