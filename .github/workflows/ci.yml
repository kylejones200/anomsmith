name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: uv pip install -e ".[dev]"

      - name: Test with coverage
        run: |
          pytest -v --tb=short --maxfail=5 --durations=10 \
            --cov=anomsmith --cov-report=term-missing --cov-fail-under=42

      - name: Ruff
        run: ruff check anomsmith/ tests/

      - name: Mypy
        run: mypy anomsmith/
